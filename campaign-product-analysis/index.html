<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign & Product Page Analysis - Josua Alexander Naibaho</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #E0FFFF, #B0C4DE);
            display: flex;
            min-height: 100vh;
            color: #2c3e50;
        }

        /* ---------- SIDEBAR KIRI (full height) ---------- */
        .sidebar {
            width: 260px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 30px;
            flex-shrink: 0;
            /* Tinggi penuh layar */
            min-height: 100vh;
        }

        .sidebar h2 {
            margin: 0;
            font-size: 1.5rem;
            color: #1a252f;
            line-height: 1.3;
            word-break: break-word;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            background: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: background 0.2s, transform 0.2s;
        }

        .home-link:hover {
            background: #1a252f;
            transform: translateY(-2px);
        }

        /* ---------- AREA UTAMA (polos, bisa diisi apa saja) ---------- */
        .main-area {
            flex: 1;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* background sedikit transparan agar menyatu */
            background: rgba(255, 255, 255, 0.2);
            margin: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.3);
            /* Jika ingin menampilkan iframe, aktifkan dan hapus placeholder di bawah */
        }

        .main-area iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
        }

        /* Placeholder jika area kosong */
        .placeholder-text {
            font-size: 1.2rem;
            color: rgba(44, 62, 80, 0.6);
            text-align: center;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                min-height: auto;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding: 15px 20px;
                gap: 15px;
            }
            .main-area {
                margin: 10px;
                height: auto;
                min-height: 300px;
            }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR KIRI -->
    <aside class="sidebar">
        <h2>Campaign & Product Page Analysis</h2>
        <a href="https://josuaalexander02.github.io/" class="home-link">
            <i class="fas fa-home"></i> Home
        </a>
    </aside>

    <!-- AREA UTAMA -->
    <main class="main-area">
        <!-- Jika ingin menampilkan presentasi, ganti placeholder di bawah dengan iframe -->
        <div class="placeholder-text">
            <p>✨ Area konten ✨</p>
        </div>

        <!-- Contoh iframe presentasi (aktifkan dengan menghapus placeholder dan ganti ID_SLIDE) -->
        <!--
        <iframe src="https://docs.google.com/presentation/d/ID_SLIDE_KAMU/embed?start=false&loop=false&delayms=3000" allowfullscreen></iframe>
        -->
    </main>

</body>
</html>
